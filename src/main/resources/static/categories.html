<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Management</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast { transition: opacity 0.5s; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen p-4">

<div class="container mx-auto max-w-4xl">

  <h1 class="text-4xl font-bold text-center mb-8 animate-fade-in">
    Category Management
  </h1>

  <div id="toast"
       class="fixed top-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg hidden toast">
  </div>

  <section class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg mb-8 animate-fade-in">
    <h2 class="text-2xl font-semibold mb-4">Add Category</h2>

    <div class="flex flex-col md:flex-row gap-4">
      <input id="name" type="text" placeholder="Category Name"
             class="flex-1 p-2 border rounded-lg">

      <input id="description" type="text" placeholder="Description"
             class="flex-1 p-2 border rounded-lg">

      <button onclick="addCategory()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Add
      </button>
    </div>
  </section>

  <section class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg mb-8 animate-fade-in">
    <h2 class="text-2xl font-semibold mb-4">Categories</h2>

    <button onclick="fetchCategories()"
            class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg mb-4">
      Refresh
    </button>

    <ul id="categoryList" class="space-y-4"></ul>
  </section>

  <section class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg mb-8 animate-fade-in">
    <h2 class="text-2xl font-semibold mb-4">Get Category By ID</h2>

    <div class="flex gap-4">
      <input id="getId" type="number" placeholder="Category ID"
             class="flex-1 p-2 border rounded-lg">

      <button onclick="getCategoryById()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Get
      </button>
    </div>

    <p id="singleCategory" class="mt-4"></p>
  </section>

  <section class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg animate-fade-in">
    <h2 class="text-2xl font-semibold mb-4">Update Category</h2>

    <div class="flex flex-col md:flex-row gap-4">
      <input id="updateId" type="number" placeholder="Category ID" class="flex-1 p-2 border rounded-lg">
      <input id="updateName" type="text" placeholder="New Category Name" class="flex-1 p-2 border rounded-lg">
      <input id="updateDescription" type="text" placeholder="New Description" class="flex-1 p-2 border rounded-lg">

      <button onclick="updateCategory()"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Update
      </button>
    </div>
  </section>

</div>

<script>

const api = "http://localhost:8080/api/categories";

function toast(message){
    alert(message);
}

async function addCategory(){

    const name=document.getElementById("name").value.trim();
    const description=document.getElementById("description").value.trim();

    if(!name){
        toast("Category name is required");
        return;
    }

    await fetch(api,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,description})
    });

    fetchCategories();

    document.getElementById("name").value="";
    document.getElementById("description").value="";
}

async function fetchCategories(){

    const res=await fetch(api);
    const data=await res.json();

    const list=document.getElementById("categoryList");
    list.innerHTML="";

    data.forEach(category=>{

        list.innerHTML+=`
        <li class="bg-gray-50 p-4 rounded-lg flex justify-between">
            <span><strong>${category.name}</strong> - ${category.description ?? ""}</span>

            <button
                onclick="deleteCategory(${category.id})"
                class="bg-red-500 text-white px-3 py-1 rounded-lg">
                Delete
            </button>
        </li>`;
    });
}

async function deleteCategory(id){

    await fetch(`${api}/${id}`,{
        method:"DELETE"
    });

    fetchCategories();
}

async function getCategoryById(){

    const id=document.getElementById("getId").value;

    const res=await fetch(`${api}/${id}`);

    if(!res.ok){
        document.getElementById("singleCategory").innerHTML="Category not found";
        return;
    }

    const category=await res.json();

    document.getElementById("singleCategory").innerHTML=
        `<strong>${category.name}</strong> - ${category.description}`;
}

async function updateCategory(){

    const id=document.getElementById("updateId").value;

    const name=document.getElementById("updateName").value;

    const description=document.getElementById("updateDescription").value;

    await fetch(`${api}/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,description})
    });

    fetchCategories();

    document.getElementById("updateId").value="";
    document.getElementById("updateName").value="";
    document.getElementById("updateDescription").value="";
}

fetchCategories();

</script>

</body>
</html>
